    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #4b5f6c" x="532.8" y="577.619456" transform="rotate(-0 532.8 577.619456)">Методическое следствие: внешняя проверка Q_pred по X_fact и Y_fact выполняется после построения априорного профиля и не изменяет d_i.</text>
