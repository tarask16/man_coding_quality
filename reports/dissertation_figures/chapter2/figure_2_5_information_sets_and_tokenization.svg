   <g id="text_17">
    <text style="font-weight: 700; font-size: 9.6px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17212b" x="258.7392" y="473.92764" transform="rotate(-0 258.7392 473.92764)">LeakageGuard и аудит априорности</text>
   </g>
   <g id="text_18">
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(183.807755 502.097793)">проверка имён колонок и источников</text>
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(186.864005 510.667117)">запрет fact_*, actual_*, target_* и q_*</text>
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(200.954044 519.445035)">правило: X_fact ∪ Y_fact ↛ d_i</text>
   </g>
   <g id="text_19">
    <text style="font-weight: 700; font-size: 9.6px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17212b" x="746.2512" y="473.94864" transform="rotate(-0 746.2512 473.94864)">Итоговый корпус априорных документов</text>
   </g>
   <g id="text_20">
    <text style="font-size: 7.35px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(642.749419 502.068843)">D_prior = {d_i | d_i = Tokenize(Discretize(X_prior(A_i)))}</text>
    <text style="font-size: 7.35px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(644.274544 510.671202)">каждый документ связан со scenario_id и protocol_id</text>
    <text style="font-size: 7.35px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(629.827774 519.427533)">корпус D_prior используется для обучения только LDA_prior</text>
   </g>
   <g id="text_21">
    <text style="font-weight: 700; font-size: 7.2px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #b3261e" x="459.0144" y="296.242875" transform="rotate(-0 459.0144 296.242875)">запрещено</text>
