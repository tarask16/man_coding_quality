   <g id="text_5">
    <text style="font-weight: 700; font-size: 9.9px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17212b" x="184.9536" y="128.043489" transform="rotate(-0 184.9536 128.043489)">X_prior — Априорные признаки</text>
   </g>
   <g id="text_6">
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(118.95242 154.14087)">структура средства и процедуры</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(116.234916 162.653065)">подготовка и внимание оператора</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(121.871307 171.321326)">условия, сообщения и контроль</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(152.713143 179.833522)">признаки prior_*</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(184.9536 188.55292)"/>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(133.504948 197.065116)">РАЗРЕШЕНО для LDA_prior</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 9.9px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17212b" x="532.8" y="128.043489" transform="rotate(-0 532.8 128.043489)">X_fact — Фактические признаки</text>
   </g>
   <g id="text_8">
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(468.802754 154.166438)">фактическое время выполнения</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(479.999289 162.8347)">ошибки, повторы и отказы</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(461.088512 171.502961)">результаты срабатывания контроля</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(482.215664 180.015156)">признаки fact_* и actual_*</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(532.8 188.734555)"/>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(469.828293 197.24675)">ТОЛЬКО для внешней проверки</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 9.9px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17212b" x="880.6464" y="128.043489" transform="rotate(-0 880.6464 128.043489)">Y_fact — Фактические показатели</text>
   </g>
   <g id="text_10">
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(838.248916 154.0117)">q_acc, q_time, q_effort</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(847.638244 162.731098)">q_res, q_rep, q_fit</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(851.679287 171.450497)">integral_quality</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(856.794177 180.169895)">quality_class</text>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(880.6464 188.889294)"/>
    <text style="font-size: 7.45px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(817.674693 197.401489)">ТОЛЬКО для внешней проверки</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17212b" x="206.0352" y="317.293859" transform="rotate(-0 206.0352 317.293859)">Дискретизация</text>
   </g>
   <g id="text_12">
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(142.289575 343.884575)">числовые признаки → интервалы</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(130.158852 352.168255)">категориальные признаки → состояния</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(146.527427 360.451935)">правила фиксируются заранее</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(206.0352 368.735615)"/>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(135.227055 377.019295)">Пример: quantile bins: low / mid / high</text>
   </g>
   <g id="text_13">
    <text style="font-weight: 700; font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17212b" x="511.7184" y="317.293859" transform="rotate(-0 511.7184 317.293859)">Токенизация</text>
   </g>
   <g id="text_14">
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(442.505255 343.845493)">признак и состояние объединяются</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(444.233927 352.129173)">каждый токен сохраняет источник</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(441.359982 360.412853)">порядок элементов не используется</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(511.7184 368.696533)"/>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(447.593283 376.980213)">Пример: prior_attention__level_low</text>
   </g>
   <g id="text_15">
    <text style="font-weight: 700; font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #17212b" x="817.4016" y="317.154796" transform="rotate(-0 817.4016 317.154796)">Документ сценария d_i</text>
   </g>
   <g id="text_16">
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(755.569862 343.845493)">набор токенов одного сценария</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(742.505702 352.129173)">частотное представление bag-of-words</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(738.921483 360.412853)">идентификаторы сценария сохраняются</text>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(817.4016 368.696533)"/>
    <text style="font-size: 7.25px; font-family: 'DejaVu Sans'; fill: #405464" transform="translate(753.900096 376.980213)">Пример: d_i = {t_i1, t_i2, …, t_im}</text>
   </g>
