   <g id="text_2">
    <text style="font-style: italic; font-size: 9.2px; font-family: 'DejaVu Sans'; fill: #435566" transform="translate(242.357031 307.003782)">Совместное влияние факторов формирует</text>
    <text style="font-style: italic; font-size: 9.2px; font-family: 'DejaVu Sans'; fill: #435566" transform="translate(258.091906 318.202985)">наблюдаемые результаты сценария</text>
   </g>
   <g id="text_3">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(53.907047 68.313144)">Средство кодирования S</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(68.477203 79.089238)">правила, таблицы,</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(85.210875 88.733301)">инструкция</text>
   </g>
   <g id="text_4">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(85.033688 131.902824)">Оператор O</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(58.0815 142.017278)">подготовка, внимание,</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(87.391969 152.322981)">утомление</text>
   </g>
   <g id="text_5">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(89.251734 196.305317)">Условия U</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(76.988531 205.292661)">время, помехи,</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(53.554781 215.912661)">доступность инструкции</text>
   </g>
   <g id="text_6">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(81.183375 259.552575)">Сообщения G</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(68.601656 269.196638)">длина, сложность,</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(82.958766 279.502341)">критичность</text>
   </g>
   <g id="text_7">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(86.073609 322.612802)">Контроль K</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(54.302203 333.447958)">проверка, обнаружение,</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(82.217672 343.092021)">исправление</text>
   </g>
   <g id="text_8">
    <text style="font-size: 11.2px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(279.453625 185.494345)">Сценарий применения</text>
    <text style="font-size: 11.2px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(293.108 198.962345)">A = {S, O, U, G, K}</text>
    <text style="font-size: 11.2px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(346.62825 208.83672)"/>
    <text style="font-size: 11.2px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(249.511125 224.024095)">ручное кодирование → контроль</text>
    <text style="font-size: 11.2px; font-family: 'DejaVu Sans'; fill: #17212b" transform="translate(271.56725 237.240095)">→ ручное декодирование</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 11.2px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #31465a" x="617.81625" y="90.720575" transform="rotate(-0 617.81625 90.720575)">Частные показатели качества</text>
   </g>
