# Словарь априорных признаков главы 5.
# direction: higher_is_better, lower_is_better или neutral.
# role фиксирует принадлежность к априорному входу; фактические и целевые признаки здесь запрещены.

features:
  prior_message_length:
    direction: lower_is_better
    role: prior
    group: message
    description: Длина сообщения; рост обычно увеличивает число ручных операций.
  prior_mean_complexity:
    direction: lower_is_better
    role: prior
    group: procedure
    description: Средняя процедурная сложность.
  prior_mean_message_criticality:
    direction: lower_is_better
    role: prior
    group: message
    description: Средняя критичность элементов сообщения.
  prior_digit_ratio:
    direction: neutral
    role: prior
    group: message
    description: Доля цифровых элементов сообщения.
  prior_control_marker_ratio:
    direction: higher_is_better
    role: prior
    group: control
    description: Доля контрольных маркеров в процедуре.
  prior_procedure_steps:
    direction: lower_is_better
    role: prior
    group: procedure
    description: Ожидаемое число шагов ручной процедуры.
  prior_total_nominal_time:
    direction: lower_is_better
    role: prior
    group: procedure
    description: Номинальное время выполнения процедуры.
  prior_operator_skill:
    direction: higher_is_better
    role: prior
    group: operator
    description: Обобщенный навык оператора.
  prior_operator_fatigue:
    direction: lower_is_better
    role: prior
    group: operator
    description: Уровень утомления оператора.
  prior_operator_attention:
    direction: higher_is_better
    role: prior
    group: operator
    description: Уровень внимания оператора.
  prior_operator_total_estimated_time:
    direction: lower_is_better
    role: prior
    group: operator
    description: Оцененное время выполнения с учетом оператора.
  prior_condition_noise_level:
    direction: lower_is_better
    role: prior
    group: condition
    description: Уровень шума или помех.
  prior_condition_time_pressure:
    direction: lower_is_better
    role: prior
    group: condition
    description: Давление времени.
  prior_condition_mean_adjusted_attention:
    direction: higher_is_better
    role: prior
    group: condition
    description: Среднее внимание с учетом условий применения.
  prior_condition_total_adjusted_time:
    direction: lower_is_better
    role: prior
    group: condition
    description: Скорректированное время выполнения с учетом условий.
  prior_control_intensity:
    direction: higher_is_better
    role: prior
    group: control
    description: Интенсивность контрольных процедур.
  prior_expected_error_probability:
    direction: lower_is_better
    role: prior
    group: risk
    description: Априорно ожидаемая вероятность ошибки.
  prior_coding_tool_type:
    direction: neutral
    role: prior
    group: procedure
    description: Тип ручного средства кодирования; нечисловой служебно-сценарный признак.
  prior_condition_profile:
    direction: neutral
    role: prior
    group: condition
    description: Профиль условий применения; нечисловой служебно-сценарный признак.
  prior_symbol_group_count:
    direction: lower_is_better
