    group: operator
    description: Ошибкоопасность оператора.
  prior_control_expected_detection_rate:
    direction: higher_is_better
    role: prior
    group: control
    description: Ожидаемая вероятность обнаружения ошибки контролем.
  prior_procedure_branch_count:
